  <script style="color: #2979ff;">
    const text = `
[INFO] Questo sito ospita un progetto tecnico dedicato alla navigazione a vela.
[INFO] Il cuore del progetto è Logbook, un'applicazione web per registrare e analizzare i dati raccolti.
[INPUT] TWA – angolo del vento reale
[INPUT] TWS – intensità del vento reale
[INPUT] LOG – velocità letta dal solcometro
[INPUT] Vele – configurazione velica
[INPUT] Onda – altezza, periodo, direzione, intensità
[STORAGE] Dati salvati nella console storica con posizione, data e ora.
[MAP] Rotta ricostruita su mappa interattiva con calcolo distanza.
[STATUS] Progetto leggero, offline, senza backend esterni.
    `;

    const consoleEl = document.getElementById('console');
    let index = 0;

    function typeText() {
      if (index < text.length) {
        consoleEl.textContent += text.charAt(index);
        index++;
        setTimeout(typeText, 75); // velocità di scrittura
      }
    }

    window.onload = typeText;
  </script>
