				    <script>
      // Funzione per distanza in metri (haversine)
      function computeDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // raggio Terra in m
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 +
                  Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                  Math.sin(dLon/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      }

      let prev = null;

      // Funzione di smoothing (media mobile semplice)
      let history = [];
      function smooth(lat, lon) {
        history.push({lat, lon});
        if (history.length > 5) history.shift();
        const avgLat = history.reduce((s, p) => s + p.lat, 0) / history.length;
        const avgLon = history.reduce((s, p) => s + p.lon, 0) / history.length;
        return {latitude: avgLat, longitude: avgLon};
      }

      // Avvia watchPosition
      if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(pos => {
          // 1) Prendi la posizione grezza
          const rawLat = pos.coords.latitude;
          const rawLon = pos.coords.longitude;

          // 2) Applica il filtro smoothing
          const { latitude, longitude } = smooth(rawLat, rawLon);

          // 3) Calcolo della velocità
          let speedMs;
          if (pos.coords.speed != null) {
            speedMs = pos.coords.speed;
          } else if (prev) {
            const dt = (pos.timestamp - prev.timestamp) / 1000;
            const dist = computeDistance(
              prev.latitude, prev.longitude,
              latitude, longitude
            );
            speedMs = dist / dt;
          } else {
            speedMs = 0;
          }

          // 4) Aggiorna prev con valori filtrati
          prev = { latitude, longitude, timestamp: pos.timestamp };

          // m/s → nodi (1 m/s = 1.94384 kt)
          const speedKt = (speedMs * 1.94384) || 0;
          document.getElementById('speedBanner').textContent =
            `Velocità: ${speedKt.toFixed(2)} kt`;
			
		  // **NOVITÀ:** aggiorna automaticamente il campo LOG
          const logSelect = document.getElementById('log');
          if (logSelect) {
            let rounded = Math.round(speedKt * 0.10) / 0.10;
            rounded = Math.min(Math.max(rounded, 0.10), 20);
            logSelect.value = rounded;
          }

          // 5) Usa latitude e longitude filtrati per mappa e salvataggio
          // updateMap(latitude, longitude);
          // saveActivity({ latitude, longitude, ... });

        }, err => {
          console.warn('Errore geolocalizzazione:', err.message);
          document.getElementById('speedBanner').textContent =
            'Velocità: – (GPS non disponibile)';
        }, {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 5000
        });
      } else {
        document.getElementById('speedBanner').textContent =
          'Velocità: – (Geolocation non supportata)';
      }
    </script>
